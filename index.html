<!DOCTYPE html>
<html>
<head>
    <title>Watch Now</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 20px; background-color: #000; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
            cursor: pointer;
            border-radius: 15px;
            overflow: hidden;
        }

        video {
            width: 100%;
            display: block;
            /* Ini yang bikin video mati dan gak bisa diapa-apain */
            pointer-events: none; 
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-button:after {
            content: '';
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent white;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<a href="https://depthschokedirected.com/kinpdqmkw?key=308eaf66481cf68b5726bc4b540bb720" target="_blank">
    <div class="video-container">
        <video>
            <source src="rus.mp4" type="video/mp4">
        </video>
        <div class="play-button"></div>
    </div>
</a>

</body>
</html>
